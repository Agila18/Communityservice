name: vanakkam_akka
description: "Tamil-language AI health app for rural women in India"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- Voice & Speech ---
  flutter_tts: ^3.8.3
  speech_to_text: ^6.3.0

  # --- Local Storage ---
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0
  path_provider: ^2.1.1

  # --- Networking ---
  dio: ^5.3.0
  web_socket_channel: ^2.4.0
  connectivity_plus: ^5.0.2

  # --- Firebase ---
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  firebase_messaging: ^14.7.9

  # --- Notifications ---
  flutter_local_notifications: ^16.3.0

  # --- Video / Teleconsult ---
  agora_rtc_engine: ^6.3.0

  # --- ML & Camera ---
  google_mlkit_text_recognition: ^0.11.0
  image_picker: ^1.0.7
  camera: ^0.10.5

  # --- Navigation & State ---
  go_router: ^12.1.1
  provider: ^6.1.1

  # --- Internationalization ---
  intl: ^0.20.2

  # --- Utilities ---
  share_plus: ^7.2.1
  pdf: ^3.10.7
  workmanager: ^0.5.2
  uuid: ^4.3.3

  # --- Code Generation ---
  hive_generator: ^2.0.1
  flutter_secure_storage: ^10.0.0
  url_launcher: ^6.3.2
  table_calendar: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
